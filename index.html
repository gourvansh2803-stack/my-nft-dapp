<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NFTradex Premium</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --bg: #050b14; --glass: rgba(17, 26, 40, 0.7); --cyan: #00f0ff; --orange: #ffaa00; --text: #e2e8f0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 90px; }
        .page { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        .card { background: var(--glass); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .nav { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1e293b; backdrop-filter: blur(5px); }
        .btn { background: linear-gradient(90deg, #00f0ff, #0066ff); border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; color: #000; }
        .timer { font-size: 22px; color: var(--cyan); font-weight: 800; text-shadow: 0 0 10px rgba(0,240,255,0.5); }
        .history-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="page-trade" class="page active">
    <h3>Trading Area</h3>
    <div class="card" id="trading-content">Initialising...</div>
    <h4>📜 My History</h4>
    <div id="history-list" class="card"></div>
</div>

<div id="page-market" class="page">
    <h3>Marketplace</h3>
    <div class="card">
        <p>NFT Price: <span id="m-price">0</span> USDT</p>
        <p>Limit Used: <span id="m-used">0</span> / 12 USDT</p>
        <p>Reset Timer:</p>
        <div class="timer" id="timer-24h">--:--:--</div>
        <button class="btn" onclick="buyNFT()">Buy NFT</button>
    </div>
</div>

<div id="page-income" class="page">
    <h3>Team Network</h3>
    <div class="card" id="team-list">Loading team...</div>
</div>

<nav class="nav">
    <button onclick="switchTab('trade')">📈 Trade</button>
    <button onclick="switchTab('market')">🛒 Market</button>
    <button onclick="switchTab('income')">💰 Income</button>
</nav>

<script>
    const contractAddress = "0x24ec0Da54E5C70E9ab3289cAA9684DE82bEa4E68";
    const abi = ["function isRegistered(address) view returns(bool)", "function activeNftIndex() view returns(uint256)", "function nfts(uint256) view returns(address, uint256)", "function lastInvestmentTimestamp(address) view returns(uint256)", "function dailyInvestment(address) view returns(uint256)", "function teamCount(address) view returns(uint256)", "function getTeam(address) view returns(address[])", "function buyNFT(address) external"];
    
    let contract, userAddress;

    async function init() {
        if (!window.ethereum) return alert("Install MetaMask");
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        const signer = provider.getSigner();
        userAddress = await signer.getAddress();
        contract = new ethers.Contract(contractAddress, abi, signer);
        loadAllData();
    }

    async function loadAllData() {
        try {
            const [idx, lastInvest, team, used] = await Promise.all([
                contract.activeNftIndex(),
                contract.lastInvestmentTimestamp(userAddress),
                contract.getTeam(userAddress),
                contract.dailyInvestment(userAddress)
            ]);

            // Trading Section
            const tradingEl = document.getElementById('trading-content');
            if(lastInvest.toNumber() === 0) {
                tradingEl.innerHTML = "<p>NO NFT PURCHASED</p>";
            } else {
                const nft = await contract.nfts(idx);
                tradingEl.innerHTML = `Active NFT #${idx}<br>Price: ${ethers.utils.formatUnits(nft[1], 18)} USDT<br><div class="timer" id="timer-36h">--:--:--</div>`;
                startTimer(lastInvest.toNumber() + (36 * 3600), 'timer-36h');
            }

            // Market Section
            document.getElementById('m-price').innerText = ethers.utils.formatUnits((await contract.nfts(idx))[1], 18);
            document.getElementById('m-used').innerText = ethers.utils.formatUnits(used, 18);
            startTimer(lastInvest.toNumber() + (24 * 3600), 'timer-24h');

            // Team Section (Last 5 digits)
            document.getElementById('team-list').innerHTML = team.map(addr => 
                `<div class="history-item"><span>...${addr.slice(-5)}</span></div>`).join('') || "No team yet";

            // History Logic
            let html = "";
            let idxNum = idx.toNumber();
            for(let i=0; i <= idxNum; i++) {
                let n = await contract.nfts(i);
                if(n[0].toLowerCase() == userAddress.toLowerCase()) {
                    let status = (i == idxNum) ? "IN SALE" : "SOLD";
                    let price = ethers.utils.formatUnits(n[1], 18);
                    html += `<div class="history-item"><span>NFT #${i}</span><span>${price} USDT</span><span style="color:var(--cyan)">${status}</span></div>`;
                }
            }
            document.getElementById('history-list').innerHTML = html || "No history";

        } catch(e) { console.error(e); }
    }

    function startTimer(end, id) {
        setInterval(() => {
            let left = end - Math.floor(Date.now() / 1000);
            let el = document.getElementById(id);
            if(el) el.innerText = left > 0 ? new Date(left * 1000).toISOString().substr(11, 8) : "00:00:00";
        }, 1000);
    }

    function switchTab(t) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-'+t).classList.add('active');
    }

    async function buyNFT() { 
        try { await (await contract.buyNFT(ethers.constants.AddressZero)).wait(); loadAllData(); } 
        catch(e) { alert("Tx Failed"); }
    }
    
    init();
</script>
</body>
</html>
