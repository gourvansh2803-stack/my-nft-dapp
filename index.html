<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NFTradex Stable</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #050b14; color: #fff; font-family: sans-serif; margin: 0; }
        .page { display: none; padding: 20px; }
        .active { display: block; }
        .card { background: #111a28; padding: 20px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #1e293b; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; }
        .btn { background: #00f0ff; color: #000; border: none; padding: 10px; border-radius: 8px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

<div id="page-trade" class="page active">
    <h3>Trading</h3>
    <div id="status" style="color:yellow">Connecting...</div>
    <div class="card" id="trading-box">No Data</div>
</div>

<div id="page-market" class="page">
    <h3>Market</h3>
    <div class="card">Price: <span id="m-price">0</span> USDT</div>
    <button class="btn" onclick="buyNFT()">Buy NFT</button>
</div>

<div id="page-income" class="page">
    <h3>Income</h3>
    <div class="card">Profit: <span id="n-profit">0</span> USDT</div>
</div>

<nav class="nav">
    <button onclick="switchTab('trade')">Trade</button>
    <button onclick="switchTab('market')">Market</button>
    <button onclick="switchTab('income')">Income</button>
</nav>

<script>
    const addr = "0x24ec0Da54E5C70E9ab3289cAA9684DE82bEa4E68";
    const abi = ["function isRegistered(address) view returns(bool)", "function activeNftIndex() view returns(uint256)", "function nfts(uint256) view returns(address, uint256)", "function lastInvestmentTimestamp(address) view returns(uint256)", "function totalEarned(address) view returns(uint256)", "function buyNFT(address) external"];
    
    let contract, user;

    async function init() {
        try {
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            await window.ethereum.request({ method: 'eth_requestAccounts' });
            user = await provider.getSigner().getAddress();
            contract = new ethers.Contract(addr, abi, provider.getSigner());
            loadData();
        } catch(e) { document.getElementById('status').innerText = "MetaMask Error: " + e.message; }
    }

    async function loadData() {
        try {
            const isReg = await contract.isRegistered(user);
            if(!isReg) { document.getElementById('status').innerText = "Not Registered"; return; }

            const idx = await contract.activeNftIndex();
            const nft = await contract.nfts(idx);
            const last = await contract.lastInvestmentTimestamp(user);
            const earned = await contract.totalEarned(user);

            // Update UI
            document.getElementById('status').innerText = "Connected";
            document.getElementById('trading-box').innerHTML = last == 0 ? "NO NFT" : `NFT #${idx}<br>Price: ${ethers.utils.formatUnits(nft[1], 18)} USDT`;
            document.getElementById('m-price').innerText = ethers.utils.formatUnits(nft[1], 18);
            document.getElementById('n-profit').innerText = (parseFloat(ethers.utils.formatUnits(earned, 18)) * 0.03).toFixed(4);
        } catch(e) { document.getElementById('status').innerText = "Data Error: " + e.message; }
    }

    function switchTab(t) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-'+t).classList.add('active');
    }

    async function buyNFT() { try { await (await contract.buyNFT(ethers.constants.AddressZero)).wait(); loadData(); } catch(e) { alert("Tx Failed"); } }
    
    init();
</script>
</body>
</html>
