<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NFTradex Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --bg-main: #050b14; --neon-cyan: #00f0ff; --neon-orange: #ffaa00; --text-muted: #94a3b8; }
        body { background: var(--bg-main); color: #fff; font-family: sans-serif; margin: 0; }
        .folder { background: #111a28; padding: 20px; border-radius: 16px; margin: 15px; border: 1px solid #1e293b; }
        .timer-text { font-size: 20px; color: var(--neon-cyan); font-weight: bold; }
        .history-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1e293b; font-size: 13px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="auth-section" class="folder">
    <button onclick="connectWallet()">Connect Wallet</button>
</div>

<div id="dashboard-sections" style="display:none">
    <div id="trading" class="folder">
        <h3>Trading Area</h3>
        <div id="nft-status-box">
            <p>Active NFT: <strong id="active-nft-id">#--</strong></p>
            <div class="timer-text" id="nft-timer-36h">--:--:--</div>
        </div>
        <h4>📜 My Bought NFTs</h4>
        <div id="my-nft-history"></div>
    </div>

    <div id="market" class="folder">
        <h3>Marketplace</h3>
        <p>Daily Limit: 12 USDT</p>
        <p>Reset Timer (24h): <span class="timer-text" id="limit-timer-24h">--:--:--</span></p>
        <button onclick="buyNFT()">Buy NFT</button>
    </div>

    <div id="income" class="folder">
        <h3>Team Members</h3>
        <div id="team-list">Loading team...</div>
    </div>
</div>

<script>
    const contractAddress = "0x24ec0Da54E5C70E9ab3289cAA9684DE82bEa4E68";
    const gameAbi = [
        "function isRegistered(address) view returns (bool)",
        "function lastInvestmentTimestamp(address) view returns (uint256)",
        "function getTeam(address) view returns (address[])", // Assumed function name for team
        "function activeNftIndex() view returns (uint256)",
        "function nfts(uint256) view returns (address owner, uint256 currentPrice)",
        "function buyNFT(address) external"
    ];

    let gameContract, userAddress;

    async function loadData() {
        let lastInvest = (await gameContract.lastInvestmentTimestamp(userAddress)).toNumber();
        
        // 1. Trading: 36h Timer (User Specific)
        if(lastInvest === 0) {
            document.getElementById("nft-status-box").innerHTML = "<h4>NO NFT PURCHASED</h4>";
        } else {
            startTimer(lastInvest + (36 * 3600), "nft-timer-36h");
        }

        // 2. Market: 24h Reset Timer
        startTimer(lastInvest + (24 * 3600), "limit-timer-24h");

        // 3. Income: Team Members
        let team = await gameContract.getTeam(userAddress);
        let teamHtml = team.map(addr => `<div class="history-item"><span>${addr.slice(0,6)}...${addr.slice(-4)}</span></div>`).join('');
        document.getElementById("team-list").innerHTML = teamHtml || "No team yet.";
    }

    function startTimer(end, id) {
        setInterval(() => {
            let left = end - Math.floor(Date.now() / 1000);
            document.getElementById(id).innerText = left > 0 ? new Date(left * 1000).toISOString().substr(11, 8) : "00:00:00";
        }, 1000);
    }
    
    // ... (baaki functions wahi hain)
</script>
</body>
</html>
