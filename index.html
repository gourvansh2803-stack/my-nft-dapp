<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NFTradex Stable Build</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #050b14; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; }
        .card { background: #111a28; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #1e293b; }
        .error { color: #ff5555; padding: 10px; border: 1px solid #ff5555; margin-bottom: 10px; }
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; }
    </style>
</head>
<body>

<div id="debug-board" style="font-size:12px; color:yellow; margin-bottom:10px;">System: Initializing...</div>

<div id="view-trade" class="view">
    <h3>Trading</h3>
    <div class="card" id="trade-ui">Connecting...</div>
    <h4>History</h4>
    <div id="history-ui"></div>
</div>

<div id="view-market" class="view" style="display:none;">
    <h3>Market</h3>
    <div class="card">Price: <span id="m-price">0</span> USDT</div>
    <button onclick="buyNFT()">Buy NFT</button>
</div>

<nav class="nav">
    <button onclick="show('trade')">Trade</button>
    <button onclick="show('market')">Market</button>
</nav>

<script>
    const addr = "0x24ec0Da54E5C70E9ab3289cAA9684DE82bEa4E68";
    const abi = ["function isRegistered(address) view returns(bool)", "function activeNftIndex() view returns(uint256)", "function nfts(uint256) view returns(address, uint256)", "function lastInvestmentTimestamp(address) view returns(uint256)", "function buyNFT(address) external"];
    
    let contract, user;

    async function init() {
        const board = document.getElementById('debug-board');
        try {
            if (!window.ethereum) throw "MetaMask not found!";
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            await window.ethereum.request({ method: 'eth_requestAccounts' });
            user = await provider.getSigner().getAddress();
            contract = new ethers.Contract(addr, abi, provider.getSigner());
            board.innerText = "Connected: " + user.slice(-5);
            loadData();
        } catch(e) { board.innerHTML = "<div class='error'>Error: " + e.message + "</div>"; }
    }

    async function loadData() {
        try {
            const idx = await contract.activeNftIndex();
            const last = await contract.lastInvestmentTimestamp(user);
            
            // Trading UI
            if(last.toNumber() === 0) {
                document.getElementById('trade-ui').innerHTML = "NO NFT PURCHASED";
            } else {
                const nft = await contract.nfts(idx);
                document.getElementById('trade-ui').innerHTML = `NFT #${idx}<br>Price: ${ethers.utils.formatUnits(nft[1], 18)} USDT`;
                document.getElementById('m-price').innerText = ethers.utils.formatUnits(nft[1], 18);
            }
        } catch(e) { document.getElementById('debug-board').innerHTML += "<br>Data Error: " + e.message; }
    }

    function show(id) {
        document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
        document.getElementById('view-'+id).style.display = 'block';
    }

    async function buyNFT() { try { await (await contract.buyNFT(ethers.constants.AddressZero)).wait(); loadData(); } catch(e) { alert(e.message); } }

    init();
</script>
</body>
</html>
