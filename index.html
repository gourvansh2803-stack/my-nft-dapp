<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Pipeline DApp</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0b0c10; color: #c5c6c7; text-align: center; padding: 10px; margin: 0; }
        .container { max-width: 450px; margin: auto; background: #1f2833; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); margin-top: 20px; }
        h2 { color: #66fcf1; margin-top: 0; font-size: 24px; }
        h3 { color: #fff; margin-top: 0; }
        input { width: 85%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #45a29e; background: #0b0c10; color: white; text-align: center; }
        button { width: 95%; padding: 12px; margin: 8px 0; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-primary { background-color: #45a29e; color: #0b0c10; }
        .btn-approve { background-color: #f39c12; color: #fff; }
        .hidden { display: none !important; }
        .tabs { display: flex; justify-content: space-between; margin-bottom: 20px; background: #0b0c10; border-radius: 8px; padding: 5px; border: 1px solid #45a29e; }
        .tab-btn { background: transparent; color: #c5c6c7; flex: 1; padding: 10px; cursor: pointer; border: none; font-size: 15px; }
        .tab-btn.active { background: #45a29e; color: #0b0c10; border-radius: 6px; font-weight: bold; }
        .folder { background: #0b0c10; padding: 20px; border-radius: 10px; border: 1px solid #45a29e; margin-top: 10px; }
        .info-box { background: #1f2833; padding: 15px; border-radius: 6px; margin-bottom: 15px; border: 1px dashed #45a29e; }
        .timer-text { font-size: 26px; color: #66fcf1; font-weight: bold; margin: 10px 0; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>NFT Pipeline DApp</h2>

        <div id="auth-section">
            <div class="folder">
                <h3>Welcome to the Game</h3>
                <button class="btn-primary" id="connect-btn" onclick="connectWallet()">Connect Wallet (Login)</button>
            </div>
            <div id="signup-box" class="hidden folder">
                <h3 style="color: #f39c12;">New Account Sign Up</h3>
                <input type="text" id="sponsor-address" placeholder="Enter Sponsor Address">
                <button class="btn-approve" onclick="approveUSDT()">1. Approve USDT</button>
                <button class="btn-primary" onclick="registerAndBuy()">2. Sign Up & Buy NFT</button>
            </div>
        </div>

        <div id="dashboard-section" class="hidden">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab(event, 'trading')">Trading</button>
                <button class="tab-btn" onclick="switchTab(event, 'market')">Market</button>
                <button class="tab-btn" onclick="switchTab(event, 'income')">Income</button>
            </div>

            <div id="trading" class="folder">
                <h3>Trading Area</h3>
                <div class="info-box">
                    <p>NFT Number: <strong style="color: #66fcf1;">#<span id="active-nft-id">0</span></strong></p>
                    <p>Price: <strong style="color:#66fcf1;"><span id="active-nft-price">0.00</span> USDT</strong></p>
                    <h3 id="nft-status-label" style="margin: 10px 0;">LOADING...</h3>
                    <div class="timer-text" id="nft-timer">--:--:--</div>
                </div>
            </div>

            <div id="market" class="folder hidden">
                <h3>Market</h3>
                <button class="btn-approve" onclick="approveUSDT()">Approve USDT</button>
                <button class="btn-primary" onclick="buyNFT()">Buy NFT</button>
            </div>

            <div id="income" class="folder hidden">
                <h3>Income & Team</h3>
                <div class="info-box" id="total-income">Earned: 0 USDT</div>
            </div>
        </div>
    </div>

    <script>
        const contractAddress = "0x24ec0Da54E5C70E9ab3289cAA9684DE82bEa4E68";
        const gameAbi = [
            "function isRegistered(address) view returns (bool)",
            "function totalEarned(address) view returns (uint256)",
            "function activeNftIndex() view returns (uint256)",
            "function nfts(uint256) view returns (address owner, uint256 currentPrice)",
            "function auctionEndTime() view returns (uint256)",
            "function usdt() view returns (address)",
            "function buyNFT(address _referrer) external"
        ];
        const erc20Abi = ["function approve(address, uint256) external returns (bool)"];

        let provider, signer, gameContract, usdtContract, userAddress;

        async function connectWallet() {
            provider = new ethers.providers.Web3Provider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            signer = provider.getSigner();
            userAddress = await signer.getAddress();
            gameContract = new ethers.Contract(contractAddress, gameAbi, signer);
            
            let isReg = await gameContract.isRegistered(userAddress);
            if(isReg) {
                document.getElementById("auth-section").classList.add("hidden");
                document.getElementById("dashboard-section").classList.remove("hidden");
                loadData();
            } else {
                document.getElementById("connect-btn").classList.add("hidden");
                document.getElementById("signup-box").classList.remove("hidden");
            }
        }

        async function loadData() {
            let isReg = await gameContract.isRegistered(userAddress);
            let labelEl = document.getElementById("nft-status-label");
            let timerEl = document.getElementById("nft-timer");

            if (!isReg) {
                labelEl.innerText = "NO NFT PURCHASED";
                timerEl.innerText = "--:--:--";
            } else {
                let activeIndex = await gameContract.activeNftIndex();
                let activeNft = await gameContract.nfts(activeIndex);
                document.getElementById("active-nft-id").innerText = activeIndex.toString();
                document.getElementById("active-nft-price").innerText = ethers.utils.formatUnits(activeNft.currentPrice, 18);
                
                let endTime = await gameContract.auctionEndTime();
                startTimer(endTime.toNumber(), labelEl, timerEl);
            }
        }

        function startTimer(end, label, timer) {
            setInterval(() => {
                let now = Math.floor(Date.now() / 1000);
                let left = end - now;
                if(left > 0) {
                    timer.innerText = new Date(left * 1000).toISOString().substr(11, 8);
                    label.innerText = "NOT FOR SALE";
                    label.style.color = "#ff4c4c";
                } else {
                    timer.innerText = "00:00:00";
                    label.innerText = "IN SALE";
                    label.style.color = "#66fcf1";
                }
            }, 1000);
        }
        // ... (Approve & Buy functions remain same)
    </script>
</body>
</html>
