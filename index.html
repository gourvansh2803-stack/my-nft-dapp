<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFTradex Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root {
            --bg-main: #050b14;
            --bg-card: #111a28;
            --neon-cyan: #00f0ff;
            --neon-blue: #0066ff;
            --neon-orange: #ffaa00;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: #000; color: var(--text-main); margin: 0; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .app-container { 
            width: 100%; max-width: 400px; height: 100vh; max-height: 850px;
            background: var(--bg-main); position: relative; overflow: hidden;
            display: flex; flex-direction: column; box-shadow: 0 0 40px rgba(0, 102, 255, 0.2);
        }

        @media (min-width: 450px) {
            .app-container { height: 90vh; border-radius: 20px; border: 1px solid #1e293b; }
        }

        .app-header {
            padding: 20px; text-align: center;
            background: linear-gradient(180deg, var(--bg-card) 0%, transparent 100%);
            border-bottom: 1px solid rgba(0, 240, 255, 0.1);
        }
        .app-header h2 { margin: 0; font-size: 22px; color: var(--neon-cyan); letter-spacing: 1px; text-transform: uppercase; }
        .wallet-status { font-size: 12px; color: var(--text-muted); margin-top: 5px; }

        .content-area { flex: 1; padding: 20px; overflow-y: auto; padding-bottom: 80px; }

        .folder { 
            background: var(--bg-card); padding: 20px; border-radius: 16px; 
            border: 1px solid rgba(255, 255, 255, 0.05); margin-bottom: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3); animation: fadeIn 0.4s ease-in-out;
        }
        
        .info-box { 
            background: rgba(0, 0, 0, 0.4); padding: 15px; border-radius: 12px; 
            margin-bottom: 15px; border-left: 3px solid var(--neon-cyan); 
        }

        .timer-text { font-size: 22px; color: var(--neon-cyan); font-weight: 800; margin: 0; letter-spacing: 1px; text-shadow: 0 0 8px rgba(0, 240, 255, 0.4); }

        input { 
            width: 100%; box-sizing: border-box; padding: 14px; margin: 10px 0; 
            border-radius: 8px; border: 1px solid #1e293b; 
            background: #0f172a; color: white; text-align: center; outline: none;
        }
        input:focus { border-color: var(--neon-cyan); box-shadow: 0 0 8px rgba(0, 240, 255, 0.2); }

        button { 
            width: 100%; padding: 14px; margin: 8px 0; border-radius: 8px; 
            border: none; font-weight: 700; font-size: 16px; cursor: pointer; 
            transition: all 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-primary { background: linear-gradient(90deg, var(--neon-blue), var(--neon-cyan)); color: #000; box-shadow: 0 4px 15px rgba(0, 240, 255, 0.3); }
        .btn-primary:active { transform: scale(0.98); box-shadow: none; }
        .btn-approve { background: transparent; border: 1px solid var(--neon-orange); color: var(--neon-orange); }

        .bottom-nav {
            position: absolute; bottom: 0; width: 100%; background: var(--bg-card);
            display: flex; justify-content: space-around; padding: 15px 0;
            border-top: 1px solid rgba(255,255,255,0.05); z-index: 10;
        }
        .nav-item {
            color: var(--text-muted); background: transparent; border: none; font-size: 12px;
            display: flex; flex-direction: column; align-items: center; gap: 5px; width: 25%; padding: 0; margin: 0; text-transform: none; font-weight: 500;
        }
        .nav-item span.icon { font-size: 20px; }
        .nav-item.active { color: var(--neon-cyan); text-shadow: 0 0 8px rgba(0, 240, 255, 0.5); }

        .history-item {
            display: flex; justify-content: space-between; padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); font-size: 13px;
        }

        .hidden { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .loader-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 11, 20, 0.9); z-index: 50;
            display: flex; justify-content: center; align-items: center;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(0, 240, 255, 0.2);
            border-top-color: var(--neon-cyan); border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <h2>NFT Pipeline</h2>
            <div class="wallet-status" id="wallet-status">🔴 Not Connected</div>
        </header>

        <div id="loader" class="loader-overlay hidden">
            <div class="spinner"></div>
        </div>

        <main class="content-area">
            <div id="auth-section" class="folder">
                <div style="text-align: center; margin-bottom: 20px;">
                    <div style="font-size: 40px; margin-bottom: 10px;">🛡️</div>
                    <h3 style="margin: 0;">Welcome to the Game</h3>
                </div>
                <button class="btn-primary" id="connect-btn" onclick="connectWallet()">Connect Wallet (Login)</button>
                
                <div id="signup-box" class="hidden" style="margin-top: 20px; border-top: 1px solid #1e293b; padding-top: 20px;">
                    <h4 style="color: var(--neon-orange); margin: 0 0 10px 0; text-align: center;">New Account</h4>
                    <input type="text" id="sponsor-address" placeholder="Enter Sponsor 0x...">
                    <button class="btn-approve" onclick="approveUSDT()">1. Approve USDT</button>
                    <button class="btn-primary" onclick="registerAndBuy()">2. Sign Up & Buy</button>
                </div>
            </div>

            <div id="dashboard-sections" style="display: none;">
                
                <div id="trading" class="folder">
                    <h3 style="margin-top: 0; color: var(--neon-cyan);">Trading Area</h3>
                    
                    <div class="info-box">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <p style="margin: 0; font-size: 12px; color: var(--text-muted);">In Line for Sale</p>
                                <p style="margin: 5px 0;">NFT: <strong style="color: var(--neon-cyan);">#<span id="active-nft-id">0</span></strong></p>
                                <p style="margin: 5px 0;">Price: <strong style="color: var(--neon-cyan);"><span id="active-nft-price">0.00</span> USDT</strong></p>
                            </div>
                            <div style="text-align: right; border-left: 1px solid #1e293b; padding-left: 15px;">
                                <p style="margin: 0; font-size: 12px; color: var(--neon-orange);">Sale Timer</p>
                                <div class="timer-text" id="nft-timer">--:--:--</div>
                            </div>
                        </div>
                    </div>

                    <div class="info-box" style="text-align: center; border-left: none; border-top: 3px solid var(--text-muted);" id="status-box">
                        <h4 id="nft-status-label" style="margin: 5px 0; color: var(--text-muted);">LOADING...</h4>
                    </div>

                    <h4 style="font-size: 14px; margin-top: 25px; color: var(--text-muted); border-bottom: 1px solid #1e293b; padding-bottom: 5px;">📜 My Bought NFTs</h4>
                    <div id="my-nft-history" style="max-height: 150px; overflow-y: auto;">
                        <p style="font-size: 12px; color: var(--text-muted);">Loading history...</p>
                    </div>
                </div>

                <div id="market" class="folder hidden">
                    <h3 style="margin-top: 0;">Marketplace</h3>
                    <div class="info-box"><p style="font-size: 13px; color: var(--text-muted);">Purchase the active NFT.</p></div>
                    <button class="btn-approve" onclick="approveUSDT()">Approve USDT</button>
                    <button class="btn-primary" onclick="buyNFT()">Buy NFT Now</button>
                </div>

                <div id="income" class="folder hidden">
                    <h3 style="margin-top: 0;">My Income</h3>
                    <div class="info-box" style="text-align: center; padding: 30px 10px;">
                        <p style="margin: 0; color: var(--text-muted); font-size: 14px;">Net Profit</p>
                        <div style="font-size: 32px; font-weight: bold; color: var(--neon-cyan); margin-top: 10px;">
                            <span id="total-income">0.00</span> <span style="font-size: 16px;">USDT</span>
                        </div>
                    </div>
                </div>

            </div>
        </main>

        <nav class="bottom-nav" id="bottom-nav" style="display: none;">
            <button class="nav-item active" onclick="switchTab('trading', this)"><span class="icon">📈</span><span>Trading</span></button>
            <button class="nav-item" onclick="switchTab('market', this)"><span class="icon">🛒</span><span>Market</span></button>
            <button class="nav-item" onclick="switchTab('income', this)"><span class="icon">💰</span><span>Income</span></button>
        </nav>
    </div>

    <script>
        const contractAddress = "0x24ec0Da54E5C70E9ab3289cAA9684DE82bEa4E68";
        const gameAbi = [
            "function isRegistered(address) view returns (bool)",
            "function totalEarned(address) view returns (uint256)",
            "function activeNftIndex() view returns (uint256)",
            "function nfts(uint256) view returns (address owner, uint256 currentPrice)",
            "function auctionEndTime() view returns (uint256)",
            "function lastInvestmentTimestamp(address) view returns (uint256)",
            "function usdt() view returns (address)",
            "function buyNFT(address _referrer) external"
        ];
        const erc20Abi = [
            "function approve(address spender, uint256 amount) external returns (bool)"
        ];

        let provider, signer, gameContract, usdtContract, userAddress;
        let timerInterval;

        function showLoader(show) {
            document.getElementById("loader").classList.toggle("hidden", !show);
        }

        async function connectWallet() {
            if (!window.ethereum) return alert("Open in MetaMask Browser!");
            
            showLoader(true);
            try {
                await window.ethereum.request({ method: "eth_requestAccounts" });
                
                provider = new ethers.providers.Web3Provider(window.ethereum);
                signer = provider.getSigner();
                userAddress = await signer.getAddress();
                
                document.getElementById("wallet-status").innerHTML = `🟢 ${userAddress.substring(0,6)}...${userAddress.slice(-4)}`;
                document.getElementById("wallet-status").style.color = "#00f0ff";

                gameContract = new ethers.Contract(contractAddress, gameAbi, signer);
                let usdtAddress = await gameContract.usdt();
                usdtContract = new ethers.Contract(usdtAddress, erc20Abi, signer);
                
                let isReg = await gameContract.isRegistered(userAddress);
                
                // Login Flow Fix
                if(isReg) {
                    document.getElementById("auth-section").style.display = "none";
                    document.getElementById("dashboard-sections").style.display = "block";
                    document.getElementById("bottom-nav").style.display = "flex";
                    await loadData();
                } else {
                    document.getElementById("connect-btn").style.display = "none";
                    document.getElementById("signup-box").classList.remove("hidden");
                }
            } catch (err) {
                console.error(err);
                alert("Connection failed!");
            }
            showLoader(false);
        }

        async function loadData() {
            try {
                let isReg = await gameContract.isRegistered(userAddress);
                let lastInvest = await gameContract.lastInvestmentTimestamp(userAddress);
                let labelEl = document.getElementById("nft-status-label");
                let timerEl = document.getElementById("nft-timer");
                let statusBox = document.getElementById("status-box");

                // Income / Net Profit
                let earned = await gameContract.totalEarned(userAddress);
                document.getElementById("total-income").innerText = parseFloat(ethers.utils.formatUnits(earned, 18)).toFixed(2);

                let activeIndex = await gameContract.activeNftIndex();
                let activeIndexNum = activeIndex.toNumber();

                // Trading Tab Logic
                if (!isReg || lastInvest.toNumber() === 0) {
                    labelEl.innerText = "NO NFT PURCHASED";
                    statusBox.style.borderTopColor = "var(--text-muted)";
                    timerEl.innerText = "--:--:--";
                } else {
                    let activeNft = await gameContract.nfts(activeIndexNum);
                    document.getElementById("active-nft-id").innerText = activeIndexNum.toString();
                    document.getElementById("active-nft-price").innerText = parseFloat(ethers.utils.formatUnits(activeNft.currentPrice, 18)).toFixed(2);
                    
                    let endTime = await gameContract.auctionEndTime();
                    startTimer(endTime.toNumber(), labelEl, timerEl, statusBox);
                }

                // Personal User History
                let historyHtml = "";
                for(let i = 0; i < activeIndexNum; i++) {
                    let nft = await gameContract.nfts(i);
                    // Check if the current user is the owner
                    if(nft.owner.toLowerCase() === userAddress.toLowerCase()) {
                        let priceStr = parseFloat(ethers.utils.formatUnits(nft.currentPrice, 18)).toFixed(2);
                        historyHtml += `<div class="history-item">
                            <span>NFT #${i}</span>
                            <span style="color:var(--neon-cyan)">${priceStr} USDT</span>
                            <span style="color:var(--neon-orange); font-weight:bold;">SOLD</span>
                        </div>`;
                    }
                }
                document.getElementById("my-nft-history").innerHTML = historyHtml || '<p style="font-size:12px; color:var(--text-muted); text-align:center;">You have no sold NFTs yet.</p>';

            } catch (err) {
                console.error("Data Load Error:", err);
            }
        }

        function startTimer(endTimeInSeconds, labelEl, timerEl, statusBox) {
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                let now = Math.floor(Date.now() / 1000);
                let timeLeft = endTimeInSeconds - now;
                if (timeLeft > 0) {
                    let h = Math.floor(timeLeft / 3600).toString().padStart(2, '0');
                    let m = Math.floor((timeLeft % 3600) / 60).toString().padStart(2, '0');
                    let s = (timeLeft % 60).toString().padStart(2, '0');
                    timerEl.innerText = `${h}:${m}:${s}`;
                    labelEl.innerText = "STATUS: NOT FOR SALE YET";
                    statusBox.style.borderTopColor = "var(--neon-orange)";
                } else {
                    timerEl.innerText = "00:00:00";
                    labelEl.innerText = "STATUS: IN SALE";
                    statusBox.style.borderTopColor = "var(--neon-cyan)";
                }
            }, 1000);
        }

        function switchTab(tabId, btnElement) {
            showLoader(true);
            setTimeout(() => {
                document.getElementById('trading').classList.add('hidden');
                document.getElementById('market').classList.add('hidden');
                document.getElementById('income').classList.add('hidden');
                
                let navItems = document.getElementsByClassName('nav-item');
                for(let i=0; i<navItems.length; i++) navItems[i].classList.remove('active');
                
                document.getElementById(tabId).classList.remove('hidden');
                btnElement.classList.add('active');
                showLoader(false);
            }, 300);
        }

        async function approveUSDT() {
            showLoader(true);
            try {
                let tx = await usdtContract.approve(contractAddress, ethers.constants.MaxUint256);
                await tx.wait(); alert("Approved!");
            } catch (err) { alert("Approval Failed!"); }
            showLoader(false);
        }

        async function registerAndBuy() {
            let s = document.getElementById("sponsor-address").value;
            if(!s) return alert("Enter Sponsor!");
            showLoader(true);
            try {
                let tx = await gameContract.buyNFT(s);
                await tx.wait(); location.reload();
            } catch (err) { alert("Failed!"); }
            showLoader(false);
        }

        async function buyNFT() {
            showLoader(true);
            try {
                let tx = await gameContract.buyNFT(ethers.constants.AddressZero);
                await tx.wait(); loadData(); alert("Purchased!");
            } catch (err) { alert("Failed!"); }
            showLoader(false);
        }
    </script>
</body>
</html>
