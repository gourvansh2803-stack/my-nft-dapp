<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NFTradex Pro - Final Optimized</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --bg: #050b14; --cyan: #00f0ff; --card: #111a28; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 70px; }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #1e293b; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1e293b; }
        .btn { background: var(--cyan); border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="loader" style="position:fixed; top:10px; right:10px; color:var(--cyan); z-index:999;"></div>

<div id="page-trade" class="page active">
    <h3>Trading Area</h3>
    <div class="card" id="trading-data">Connect wallet to view...</div>
    <h4>📜 My History</h4>
    <div id="history-list"></div>
</div>

<div id="page-market" class="page">
    <h3>Marketplace</h3>
    <div class="card" id="market-data">
        <p>Price: <span id="m-price">0</span> USDT</p>
        <p>Limit Reset (24h): <span id="timer-24h" style="color:var(--cyan)">--:--:--</span></p>
        <button class="btn" onclick="buyNFT()">Buy NFT</button>
    </div>
</div>

<div id="page-income" class="page">
    <h3>My Account</h3>
    <div class="card" id="income-data">
        <p>Net Profit (3%): <span id="n-profit">0</span> USDT</p>
        <p>Team Members:</p>
        <div id="team-list"></div>
    </div>
</div>

<nav class="nav">
    <button onclick="switchTab('trade')">📈 Trade</button>
    <button onclick="switchTab('market')">🛒 Market</button>
    <button onclick="switchTab('income')">💰 Income</button>
</nav>

<script>
    const contractAddress = "0x24ec0Da54E5C70E9ab3289cAA9684DE82bEa4E68";
    const abi = ["function isRegistered(address) view returns(bool)", "function activeNftIndex() view returns(uint256)", "function nfts(uint256) view returns(address, uint256)", "function lastInvestmentTimestamp(address) view returns(uint256)", "function totalEarned(address) view returns(uint256)", "function teamCount(address) view returns(uint256)", "function getTeam(address) view returns(address[])", "function buyNFT(address) external"];
    
    let contract, userAddress;

    async function init() {
        if (!window.ethereum) return alert("Install MetaMask");
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        const signer = provider.getSigner();
        userAddress = await signer.getAddress();
        contract = new ethers.Contract(contractAddress, abi, signer);
        switchTab('trade');
    }

    async function switchTab(t) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-'+t).classList.add('active');
        
        // Lazy Loading: Data sirf tab khulne par load hoga
        document.getElementById('loader').innerText = "Loading...";
        try {
            if(t === 'trade') await loadTrade();
            if(t === 'market') await loadMarket();
            if(t === 'income') await loadIncome();
        } catch(e) { console.error(e); }
        document.getElementById('loader').innerText = "";
    }

    async function loadTrade() {
        const last = (await contract.lastInvestmentTimestamp(userAddress)).toNumber();
        if(last === 0) {
            document.getElementById('trading-content').innerHTML = "NO NFT PURCHASED";
        } else {
            const idx = await contract.activeNftIndex();
            const nft = await contract.nfts(idx);
            document.getElementById('trading-content').innerHTML = `NFT #${idx} | Price: ${ethers.utils.formatUnits(nft[1], 18)} USDT <br> <div id="timer-36h" style="color:var(--cyan)">--:--:--</div>`;
            startTimer(last + (36 * 3600), 'timer-36h');
            
            // History
            let html = "";
            for(let i=0; i<idx.toNumber(); i++) {
                let n = await contract.nfts(i);
                if(n[0].toLowerCase() == userAddress.toLowerCase()) html += `<div class="history-item"><span>NFT #${i}</span><span>SOLD</span></div>`;
            }
            document.getElementById('history-list').innerHTML = html || "No history";
        }
    }

    async function loadMarket() {
        const idx = await contract.activeNftIndex();
        const nft = await contract.nfts(idx);
        const last = (await contract.lastInvestmentTimestamp(userAddress)).toNumber();
        document.getElementById('m-price').innerText = ethers.utils.formatUnits(nft[1], 18);
        startTimer(last + (24 * 3600), 'timer-24h');
    }

    async function loadIncome() {
        const earned = await contract.totalEarned(userAddress);
        const team = await contract.getTeam(userAddress);
        document.getElementById('n-profit').innerText = (parseFloat(ethers.utils.formatUnits(earned, 18)) * 0.03).toFixed(4);
        document.getElementById('team-list').innerHTML = team.map(addr => `<div>${addr.slice(0,6)}...</div>`).join('');
    }

    function startTimer(end, id) {
        let el = document.getElementById(id);
        if(!el) return;
        let interval = setInterval(() => {
            let left = end - Math.floor(Date.now() / 1000);
            if(left > 0) el.innerText = new Date(left * 1000).toISOString().substr(11, 8);
            else { el.innerText = "00:00:00"; clearInterval(interval); }
        }, 1000);
    }

    async function buyNFT() { await (await contract.buyNFT(ethers.constants.AddressZero)).wait(); alert("Done!"); }
    init();
</script>
</body>
</html>
