<script>
    const contractAddress = "0x24ec0Da54E5C70E9ab3289cAA9684DE82bEa4E68";
    
    const gameAbi = [
        "function isRegistered(address) view returns (bool)",
        "function totalEarned(address) view returns (uint256)",
        "function teamCount(address) view returns (uint256)",
        "function dailyInvestment(address) view returns (uint256)",
        "function lastInvestmentTimestamp(address) view returns (uint256)",
        "function auctionEndTime() view returns (uint256)",
        "function usdt() view returns (address)",
        "function buyNFT(address _referrer) external"
    ];

    const erc20Abi = [
        "function approve(address spender, uint256 amount) external returns (bool)",
        "function allowance(address owner, address spender) external view returns (uint256)"
    ];

    let provider, signer, gameContract, usdtContract, userAddress;

    // ==========================================
    // NETWORK SWITCHER (STRICTLY OPBNB)
    // ==========================================
    async function enforceOpBNBNetwork() {
        const opbnbChainId = '0xcc'; // 204 in Hex (opBNB Mainnet)
        
        const currentChainId = await window.ethereum.request({ method: 'eth_chainId' });
        if (currentChainId !== opbnbChainId) {
            try {
                // Try switching to opBNB
                await window.ethereum.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: opbnbChainId }],
                });
            } catch (switchError) {
                // If opBNB is not added to user's MetaMask, add it automatically
                if (switchError.code === 4902) {
                    await window.ethereum.request({
                        method: 'wallet_addEthereumChain',
                        params: [{
                            chainId: opbnbChainId,
                            chainName: 'opBNB Mainnet',
                            nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 },
                            rpcUrls: ['https://opbnb-mainnet-rpc.bnbchain.org'],
                            blockExplorerUrls: ['https://mainnet.opbnbscan.com']
                        }],
                    });
                } else {
                    throw switchError;
                }
            }
        }
    }

    // ==========================================
    // INITIALIZE & CONNECT WALLET
    // ==========================================
    async function connectWallet() {
        if (window.ethereum) {
            try {
                // Pehle network check aur switch karo
                await enforceOpBNBNetwork();

                provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                signer = provider.getSigner();
                userAddress = await signer.getAddress();
                
                gameContract = new ethers.Contract(contractAddress, gameAbi, signer);
                
                // OpBNB Network se USDT ka address nikalo
                let usdtAddress = await gameContract.usdt();
                usdtContract = new ethers.Contract(usdtAddress, erc20Abi, signer);
                
                document.getElementById("user-wallet").innerText = userAddress.substring(0, 6) + "..." + userAddress.slice(-4);
                
                let registered = await gameContract.isRegistered(userAddress);
                if (registered) {
                    document.getElementById("auth-section").classList.add("hidden");
                    document.getElementById("dashboard-section").classList.remove("hidden");
                    loadDashboardData();
                } else {
                    document.getElementById("connect-btn").classList.add("hidden");
                    document.getElementById("signup-box").classList.remove("hidden");
                }
            } catch (error) {
                console.error(error);
                alert("Connection ya Network switch fail ho gaya. Please approve opBNB network in MetaMask!");
            }
        } else {
            alert("Please install MetaMask!");
        }
    }

    // ==========================================
    // LOAD DASHBOARD DATA
    // ==========================================
    async function loadDashboardData() {
        // INCOME FOLDER
        let earned = await gameContract.totalEarned(userAddress);
        let team = await gameContract.teamCount(userAddress);
        document.getElementById("total-income").innerText = parseFloat(ethers.utils.formatUnits(earned, 18)).toFixed(4);
        document.getElementById("team-count").innerText = team.toString();

        // MARKET FOLDER (Limits & Timers)
        let usedLimit = await gameContract.dailyInvestment(userAddress);
        let lastInvestTime = await gameContract.lastInvestmentTimestamp(userAddress);
        let limitResetTime = lastInvestTime.toNumber() + (24 * 3600); 

        if (Math.floor(Date.now() / 1000) > limitResetTime) {
            document.getElementById("used-limit").innerText = "0.00";
        } else {
            document.getElementById("used-limit").innerText = ethers.utils.formatUnits(usedLimit, 18);
            start24hTimer(limitResetTime);
        }

        // TRADING FOLDER (36h Timer)
        let auctionEnd = await gameContract.auctionEndTime();
        start36hTimer(auctionEnd.toNumber());
    }

    function start36hTimer(endTimeInSeconds) {
        setInterval(() => {
            let now = Math.floor(Date.now() / 1000);
            let timeLeft = endTimeInSeconds - now;
            if (timeLeft > 0) {
                let h = Math.floor(timeLeft / 3600).toString().padStart(2, '0');
                let m = Math.floor((timeLeft % 3600) / 60).toString().padStart(2, '0');
                let s = (timeLeft % 60).toString().padStart(2, '0');
                document.getElementById("nft-timer").innerText = `${h}:${m}:${s}`;
            } else {
                document.getElementById("nft-timer").innerText = "IN SALE";
            }
        }, 1000);
    }

    function start24hTimer(endTimeInSeconds) {
        let timerInterval = setInterval(() => {
            let now = Math.floor(Date.now() / 1000);
            let timeLeft = endTimeInSeconds - now;
            if (timeLeft > 0) {
                let h = Math.floor(timeLeft / 3600).toString().padStart(2, '0');
                let m = Math.floor((timeLeft % 3600) / 60).toString().padStart(2, '0');
                let s = (timeLeft % 60).toString().padStart(2, '0');
                document.getElementById("limit-timer").innerText = `${h}:${m}:${s}`;
            } else {
                document.getElementById("limit-timer").innerText = "00:00:00";
                document.getElementById("used-limit").innerText = "0.00";
                clearInterval(timerInterval);
            }
        }, 1000);
    }

    function switchTab(tabId) {
        document.querySelectorAll('.folder').forEach(el => {
            if (el.id !== 'signup-box') el.classList.add('hidden');
        });
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabId).classList.remove('hidden');
        event.target.classList.add('active');
    }

    // ==========================================
    // WORKING BUTTONS: APPROVE & BUY LOGIC
    // ==========================================
    async function approveUSDT() {
        try {
            // OpBNB wale USDT ko directly approve de rahe hain
            let maxApproveAmount = ethers.constants.MaxUint256; 
            let tx = await usdtContract.approve(contractAddress, maxApproveAmount);
            alert("Approve request sent to opBNB. Please confirm in MetaMask.");
            await tx.wait();
            alert("USDT Approved Successfully on opBNB!");
        } catch (err) {
            console.error(err);
            alert("Approval Failed! Please check your balance or MetaMask popup.");
        }
    }

    async function registerAndBuy() {
        let sponsor = document.getElementById("sponsor-address").value;
        if(!sponsor) { alert("Please enter Sponsor Address!"); return; }
        if(!ethers.utils.isAddress(sponsor)) { alert("Invalid Sponsor Address format!"); return; }

        try {
            let tx = await gameContract.buyNFT(sponsor);
            alert("Transaction sent to opBNB! Waiting for block confirmation...");
            await tx.wait();
            alert("Success! Welcome to the game.");
            location.reload(); 
        } catch (err) {
            console.error(err);
            alert("Transaction Failed! USDT approve kiya tha?");
        }
    }

    async function buyNFT() {
        try {
            let tx = await gameContract.buyNFT(ethers.constants.AddressZero);
            alert("Buy transaction sent to opBNB! Waiting for confirmation...");
            await tx.wait();
            alert("NFT Purchased Successfully on opBNB!");
            loadDashboardData(); 
        } catch (err) {
            console.error(err);
            alert("Purchase Failed! Limit check karo ya USDT Approve karo.");
        }
    }
</script>
