<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        :root { --bg: #050b14; --cyan: #00f0ff; --card: #111a28; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; }
        .nav-bar { display: flex; justify-content: space-around; padding: 15px; background: #000; position: fixed; bottom: 0; width: 100%; border-top: 1px solid #1e293b; }
        .page { padding: 20px; display: none; }
        .active { display: block; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #1e293b; }
        .btn-main { background: var(--cyan); color: #000; padding: 12px; border-radius: 8px; width: 100%; border: none; font-weight: bold; }
    </style>
</head>
<body>

<div id="page-home" class="page active">
    <h3>Trading Dashboard</h3>
    <div class="card" id="nft-status">Loading...</div>
    <div id="my-history"></div>
</div>

<div id="page-market" class="page">
    <h3>Marketplace</h3>
    <div class="card">Price: <span id="m-price">0</span> USDT</div>
    <button class="btn-main" onclick="buyNFT()">Buy Now</button>
</div>

<div class="nav-bar">
    <button onclick="showPage('home')">📈 Trade</button>
    <button onclick="showPage('market')">🛒 Market</button>
</div>

<script>
    function showPage(p) {
        document.querySelectorAll('.page').forEach(el => el.style.display = 'none');
        document.getElementById('page-'+p).style.display = 'block';
    }

    async function loadPageData(tab) {
        if(tab === 'home') {

        }
    }
</script>
</body>
</html>
